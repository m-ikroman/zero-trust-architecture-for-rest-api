spring.application.name=zta-api

# ---- Active Profile ----
# Gunakan 'h2' untuk testing lokal, 'mysql' untuk Docker
spring.profiles.active=h2

# ---- Server ----
server.port=8080

# ---- JWT Configuration ----
# Secret key minimal 256-bit (32 karakter) untuk HS256
app.jwt.secret=ZTA-SecretKey-2024-UniversitasSiliwangi-Ikroman-227006108-SkripsiKey
app.jwt.expiration-ms=900000
# 15 menit = 900000 ms

# ---- ZTA Risk Score Thresholds (Jeong & Yang, 2025) ----
app.zta.risk.threshold.low=39
app.zta.risk.threshold.medium=69
app.zta.risk.weight.ip-consistency=30
app.zta.risk.weight.user-agent=25
app.zta.risk.weight.request-frequency=25
app.zta.risk.weight.token-expiry=20

# ---- Rate Limiting ----
app.zta.rate-limit.max-requests-per-minute=30

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

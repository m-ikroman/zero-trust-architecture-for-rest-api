# =============================================
# Profile: Test (H2 in-memory, logging minimal)
# =============================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

app.jwt.secret=ZTA-Test-Secret-Key-For-Unit-Testing-Only-Ikroman
app.jwt.expiration-ms=900000

app.zta.risk.threshold.low=39
app.zta.risk.threshold.medium=69
app.zta.risk.weight.ip-consistency=30
app.zta.risk.weight.user-agent=25
app.zta.risk.weight.request-frequency=25
app.zta.risk.weight.token-expiry=20
app.zta.rate-limit.max-requests-per-minute=30

logging.level.com.ikroman.ztaapi=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
